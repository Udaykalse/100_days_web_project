<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome — Sign In or Create an Account</title>
    <meta
      name="description"
      content="A sliding sign-in and sign-up panel with live validation, password strength feedback, and dark mode."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button
      id="themeToggle"
      class="theme-toggle"
      type="button"
      aria-label="Switch to dark theme"
      aria-pressed="false"
    >
      <i class="fa-solid fa-moon" aria-hidden="true"></i>
    </button>

    <main class="container" id="container">
      <span class="punch punch-a" aria-hidden="true"></span>
      <span class="punch punch-b" aria-hidden="true"></span>

      <section
        class="form-container sign-up-container"
        aria-hidden="true"
        inert
      >
        <form id="signUpForm" novalidate>
          <h1>Create account</h1>
          <div class="social-container">
            <a href="#" class="social" aria-label="Continue with Instagram"
              ><i class="fa-brands fa-instagram"></i
            ></a>
            <a href="#" class="social" aria-label="Continue with Google"
              ><i class="fa-brands fa-google"></i
            ></a>
            <a href="#" class="social" aria-label="Continue with TikTok"
              ><i class="fa-brands fa-tiktok"></i
            ></a>
          </div>
          <span class="divider-text">or register with your email</span>

          <div class="input-group">
            <i class="fa-solid fa-user" aria-hidden="true"></i>
            <label for="suName" class="sr-only">Full name</label>
            <input
              type="text"
              id="suName"
              name="name"
              placeholder="Full name"
              autocomplete="name"
              required
            />
          </div>
          <span class="error-msg" id="suNameError" role="alert"></span>

          <div class="input-group">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            <label for="suEmail" class="sr-only">Email</label>
            <input
              type="email"
              id="suEmail"
              name="email"
              placeholder="Email"
              autocomplete="email"
              required
            />
          </div>
          <span class="error-msg" id="suEmailError" role="alert"></span>

          <div class="input-group">
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            <label for="suPassword" class="sr-only">Password</label>
            <input
              type="password"
              id="suPassword"
              name="password"
              placeholder="Password"
              autocomplete="new-password"
              required
              minlength="8"
            />
            <button
              type="button"
              class="toggle-visibility"
              data-target="suPassword"
              aria-label="Show password"
            >
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <div class="strength-meter" id="strengthMeter" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
          <span class="error-msg" id="suPasswordError" role="alert"></span>

          <div class="input-group">
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            <label for="suConfirm" class="sr-only">Confirm password</label>
            <input
              type="password"
              id="suConfirm"
              name="confirmPassword"
              placeholder="Confirm password"
              autocomplete="new-password"
              required
            />
            <button
              type="button"
              class="toggle-visibility"
              data-target="suConfirm"
              aria-label="Show password"
            >
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <span class="error-msg" id="suConfirmError" role="alert"></span>

          <label class="checkbox-row">
            <input type="checkbox" id="suTerms" required />
            <span
              >I agree to the <a href="#">Terms</a> and
              <a href="#">Privacy Policy</a></span
            >
          </label>
          <span class="error-msg" id="suTermsError" role="alert"></span>

          <button type="submit" class="submit-btn">
            <span class="btn-text">Sign Up</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
        </form>
      </section>

      <section class="form-container sign-in-container" aria-hidden="false">
        <form id="signInForm" novalidate>
          <h1>Sign in</h1>
          <div class="social-container">
            <a href="#" class="social" aria-label="Continue with Instagram"
              ><i class="fa-brands fa-instagram"></i
            ></a>
            <a href="#" class="social" aria-label="Continue with Google"
              ><i class="fa-brands fa-google"></i
            ></a>
            <a href="#" class="social" aria-label="Continue with TikTok"
              ><i class="fa-brands fa-tiktok"></i
            ></a>
          </div>
          <span class="divider-text">or use your account</span>

          <div class="input-group">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            <label for="siEmail" class="sr-only">Email</label>
            <input
              type="email"
              id="siEmail"
              name="email"
              placeholder="Email"
              autocomplete="email"
              required
            />
          </div>
          <span class="error-msg" id="siEmailError" role="alert"></span>

          <div class="input-group">
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            <label for="siPassword" class="sr-only">Password</label>
            <input
              type="password"
              id="siPassword"
              name="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              class="toggle-visibility"
              data-target="siPassword"
              aria-label="Show password"
            >
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <span class="error-msg" id="siPasswordError" role="alert"></span>

          <div class="form-row">
            <label class="checkbox-row inline">
              <input type="checkbox" id="siRemember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="submit-btn">
            <span class="btn-text">Sign In</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
        </form>
      </section>

      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-left">
            <h1>Welcome back</h1>
            <p>
              Already have an account? Sign in to pick up your journey with us.
            </p>
            <button class="ghost" id="signIn" type="button">Sign In</button>
          </div>
          <div class="overlay-panel overlay-right">
            <h1>New here?</h1>
            <p>Create an account and start your journey with us today.</p>
            <button class="ghost" id="signUp" type="button">Sign Up</button>
          </div>
        </div>
      </div>
    </main>

    <div
      class="toast-container"
      id="toastContainer"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script src="./script.js"></script>
  </body>
</html>
